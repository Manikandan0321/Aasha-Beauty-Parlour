<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Aasha Admin</title>

<style>
body { font-family: Arial; background:#f5f5f5; margin:0; }

/* HEADER */
.top-bar {
  background:black;
  color:white;
  text-align:center;
  padding:15px;
}

/* STATS */
.stats {
  display:grid;
  grid-template-columns: repeat(4,1fr);
  gap:10px;
  padding:15px;
}
.card {
  background:white;
  padding:10px;
  border-radius:8px;
  text-align:center;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

/* TABS */
.tabs {
  display:flex;
  justify-content:center;
  gap:10px;
  background:white;
  padding:10px;
}
.tab-btn {
  padding:6px 12px;
  background:#ddd;
  border-radius:5px;
  cursor:pointer;
}
.tab-btn.active {
  background:black;
  color:white;
}

/* TABLE */
table { width:100%; background:white; border-collapse:collapse; }
th, td { padding:8px; text-align:center; }
th { background:#111; color:white; }

/* BUTTONS */
button {
  padding:4px 8px;
  border:none;
  border-radius:5px;
  color:white;
  cursor:pointer;
}
.view { background:green; }
.edit { background:orange; }
.confirm { background:blue; }
.delete { background:red; }
.pay { background:purple; }
.bill { background:#444; }

/* MODAL */
.modal {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
}
.modal-box {
  background:white;
  padding:20px;
  border-radius:10px;
  width:300px;
}
.modal-box input, textarea {
  width:100%;
  margin:5px 0;
  padding:6px;
}
</style>
</head>

<body>

<div class="top-bar">
  <h2>Aasha Admin Dashboard</h2>
</div>

<!-- STATS -->
<div class="stats">
  <div class="card"><h3 id="total">0</h3>Total</div>
  <div class="card"><h3 id="pendingCount">0</h3>Pending</div>
  <div class="card"><h3 id="confirmedCount">0</h3>Confirmed</div>
  <div class="card"><h3 id="revenue">₹0</h3>Revenue</div>
</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab-btn active" onclick="switchTab('pending',event)">Pending</div>
  <div class="tab-btn" onclick="switchTab('confirmed',event)">Confirmed</div>
  <div class="tab-btn" onclick="switchTab('payments',event)">Payments</div>
</div>

<!-- PENDING -->
<div id="pending">
  <div id="pendingTable"></div>
</div>

<!-- CONFIRMED -->
<div id="confirmed" style="display:none;">
  <div id="confirmedTable"></div>
</div>

<!-- PAYMENTS -->
<div id="payments" style="display:none;">
  <div id="paymentTable"></div>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-box">
    <h3>Edit Details</h3>

    <input id="name">
    <input id="email">
    <input id="phone">
    <input id="service">
    <input id="date" type="date">
    <input id="time" type="time">
    <textarea id="message"></textarea>

    <button onclick="saveEdit()" class="confirm">Save</button>
    <button onclick="closeModal()" class="delete">Close</button>
  </div>
</div>

<script>

let allData=[];
let payments=[];
let currentIndex=null;

/* TAB */
function switchTab(tab,e){
  document.getElementById("pending").style.display="none";
  document.getElementById("confirmed").style.display="none";
  document.getElementById("payments").style.display="none";

  document.getElementById(tab).style.display="block";

  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  e.target.classList.add("active");

  if(tab==="payments") loadPayments();
}

/* LOAD */
async function loadData(){
  const res = await fetch("/data");
  allData = await res.json();

  updateStats();
  renderPending();
  renderConfirmed();
}

/* STATS */
function updateStats(){
  document.getElementById("total").innerText=allData.length;

  const pending=allData.filter(d=>!d.confirmed);
  const confirmed=allData.filter(d=>d.confirmed);

  document.getElementById("pendingCount").innerText=pending.length;
  document.getElementById("confirmedCount").innerText=confirmed.length;

  const revenue=confirmed.reduce((s,c)=>s+(c.price||0),0);
  document.getElementById("revenue").innerText="₹"+revenue;
}

/* PENDING */
function renderPending(){
  let html=`<table>
  <tr><th>Name</th><th>Service</th><th>Date</th><th>Actions</th></tr>`;

  allData.filter(d=>!d.confirmed).forEach((d,i)=>{
    const index=allData.indexOf(d);

    html+=`
    <tr>
      <td>${d.name}</td>
      <td>${d.event}</td>
      <td>${d.date}</td>
      <td>
        <button class="view" onclick="view(${index})">View</button>
        <button class="confirm" onclick="confirmBooking(${index})">Confirm</button>
        <button class="delete" onclick="deleteBooking(${index})">Delete</button>
      </td>
    </tr>`;
  });

  html+="</table>";
  document.getElementById("pendingTable").innerHTML=html;
}

/* CONFIRMED */
function renderConfirmed(){
  let html=`<table>
  <tr><th>Name</th><th>Service</th><th>Price</th><th>Actions</th></tr>`;

  allData.filter(d=>d.confirmed).forEach(d=>{
    const index=allData.indexOf(d);

    html+=`
    <tr>
      <td>${d.name}</td>
      <td>${d.event}</td>
      <td>₹${d.price}</td>
      <td>
        <button class="pay" onclick="pay(${index})">Pay</button>
        <button class="bill" onclick="bill(${index})">Bill</button>
      </td>
    </tr>`;
  });

  html+="</table>";
  document.getElementById("confirmedTable").innerHTML=html;
}

/* VIEW + EDIT */
function view(i){
  const d=allData[i];
  currentIndex=i;

  name.value=d.name;
  email.value=d.email;
  phone.value=d.phone;
  service.value=d.event;
  date.value=d.date;
  time.value=d.time;
  message.value=d.message;

  modal.style.display="flex";
}

function closeModal(){
  modal.style.display="none";
}

async function saveEdit(){
  const updated={
    name:name.value,
    email:email.value,
    phone:phone.value,
    event:service.value,
    date:date.value,
    time:time.value,
    message:message.value
  };

  await fetch(`/edit/${currentIndex}`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(updated)
  });

  alert("Updated ✅");
  closeModal();
  loadData();
}

/* ACTIONS */
async function confirmBooking(i){
  const price=prompt("Enter price");
  if(!price) return;

  await fetch(`/confirm/${i}`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({price})
  });

  loadData();
}

async function deleteBooking(i){
  await fetch(`/delete/${i}`,{method:"DELETE"});
  loadData();
}

function pay(i){
  const amount=prompt("Enter amount");
  fetch(`/payment/${i}`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({amount,method:"Cash"})
  });
  alert("Paid");
}

function bill(i){
  window.open(`/bill/${i}`);
}

/* PAYMENTS */
async function loadPayments(){
  const res=await fetch("/payments");
  payments=await res.json();

  let html=`<table>
  <tr><th>Name</th><th>Service</th><th>Amount</th></tr>`;

  payments.forEach(p=>{
    html+=`
    <tr>
      <td>${p.bookingName}</td>
      <td>${p.event}</td>
      <td>₹${p.amount}</td>
    </tr>`;
  });

  html+="</table>";
  document.getElementById("paymentTable").innerHTML=html;
}

/* INIT */
loadData();
setInterval(loadData,5000);

</script>
</body>
</html>
